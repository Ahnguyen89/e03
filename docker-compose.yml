# Docker Compose - backend-first minimal deployment
# Run: docker compose up --build

services:
  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      FRONTEND_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - gateway
    networks:
      - app-network

  gateway:
    build: ./gateway
    ports:
      - "${GATEWAY_PORT:-8080}:8000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 8000
      GATEWAY_CORS_ORIGIN: ${GATEWAY_CORS_ORIGIN:-http://localhost:3000}
      ROOM_SERVICE_URL: ${ROOM_SERVICE_URL:-http://room-service:5000}
      SCHEDULE_SERVICE_URL: ${SCHEDULE_SERVICE_URL:-http://schedule-service:5000}
      BOOKING_SERVICE_URL: ${BOOKING_SERVICE_URL:-http://booking-service:5000}
    depends_on:
      - room-service
      - schedule-service
      - booking-service
    networks:
      - app-network

  room-service:
    build: ./services/room-service
    ports:
      - "${ROOM_SERVICE_PORT:-5001}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      ROOM_SERVICE_DB_URL: ${ROOM_SERVICE_DB_URL:-postgresql://room_user:room_pass@room-db:5432/room_db}
      ROOM_DB_HOST: ${ROOM_DB_HOST:-room-db}
      ROOM_DB_PORT: ${ROOM_DB_PORT:-5432}
    depends_on:
      - room-db
    networks:
      - app-network

  schedule-service:
    build: ./services/schedule-service
    ports:
      - "${SCHEDULE_SERVICE_PORT:-5002}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      SCHEDULE_SERVICE_DB_URL: ${SCHEDULE_SERVICE_DB_URL:-postgresql://schedule_user:schedule_pass@schedule-db:5432/schedule_db}
      SCHEDULE_DB_HOST: ${SCHEDULE_DB_HOST:-schedule-db}
      SCHEDULE_DB_PORT: ${SCHEDULE_DB_PORT:-5432}
    depends_on:
      - schedule-db
    networks:
      - app-network

  booking-service:
    build: ./services/booking-service
    ports:
      - "${BOOKING_SERVICE_PORT:-5003}:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      BOOKING_SERVICE_DB_URL: ${BOOKING_SERVICE_DB_URL:-postgresql://booking_user:booking_pass@booking-db:5432/booking_db}
      ROOM_SERVICE_URL: ${ROOM_SERVICE_URL:-http://room-service:5000}
      SCHEDULE_SERVICE_URL: ${SCHEDULE_SERVICE_URL:-http://schedule-service:5000}
      BOOKING_DB_HOST: ${BOOKING_DB_HOST:-booking-db}
      BOOKING_DB_PORT: ${BOOKING_DB_PORT:-5432}
    depends_on:
      - booking-db
      - room-service
      - schedule-service
    networks:
      - app-network

  room-db:
    image: postgres:16-alpine
    ports:
      - "${ROOM_DB_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${ROOM_DB_NAME:-room_db}
      POSTGRES_USER: ${ROOM_DB_USER:-room_user}
      POSTGRES_PASSWORD: ${ROOM_DB_PASSWORD:-room_pass}
    volumes:
      - room-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  schedule-db:
    image: postgres:16-alpine
    ports:
      - "${SCHEDULE_DB_HOST_PORT:-5434}:5432"
    environment:
      POSTGRES_DB: ${SCHEDULE_DB_NAME:-schedule_db}
      POSTGRES_USER: ${SCHEDULE_DB_USER:-schedule_user}
      POSTGRES_PASSWORD: ${SCHEDULE_DB_PASSWORD:-schedule_pass}
    volumes:
      - schedule-db-data:/var/lib/postgresql/data
    networks:
      - app-network

  booking-db:
    image: postgres:16-alpine
    ports:
      - "${BOOKING_DB_HOST_PORT:-5435}:5432"
    environment:
      POSTGRES_DB: ${BOOKING_DB_NAME:-booking_db}
      POSTGRES_USER: ${BOOKING_DB_USER:-booking_user}
      POSTGRES_PASSWORD: ${BOOKING_DB_PASSWORD:-booking_pass}
    volumes:
      - booking-db-data:/var/lib/postgresql/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  room-db-data:
  schedule-db-data:
  booking-db-data:
