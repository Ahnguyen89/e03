server {
    listen 8000;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    set $room_service "room-service:5000";
    set $schedule_service "schedule-service:5000";
    set $booking_service "booking-service:5000";

    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;

    if ($request_method = OPTIONS) {
        return 204;
    }

    location = /health {
        default_type application/json;
        return 200 '{"status":"ok"}';
    }

    location ^~ /api/rooms {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://$room_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/schedules {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://$schedule_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/bookings {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://$booking_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        default_type application/json;
        return 404 '{"code":"RESOURCE_NOT_FOUND","message":"Resource not found"}';
    }
}
